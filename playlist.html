        body {
            font-family: Poppins, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027, #2c5364, #1a1a2e);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
        }

        .playlist-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }

        .music-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 320px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .music-card img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .music-card iframe {
            width: 100%;
            height: 80px;
            border-radius: 12px;
        }

        .music-card audio {
            width: 100%;
            margin-top: 10px;
        }

        /* tombol */

        .nav {
            margin-bottom: 40px;
        }

        button {
            padding: 12px 35px;
            margin: 10px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
        }

        @media (max-width:768px) {

            .menu {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }

            .navbar {
                flex-direction: column;
                gap: 10px;
            }

            h1 {
                font-size: 2.2rem;
            }

        }

        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 1.5s ease forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* SPOTIFY PLAYER */
        .spotify-player {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-cover {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            object-fit: cover;
            margin: 0 auto 15px;
            animation: rotate 20s linear infinite paused;
        }

        .player-cover.playing {
            animation-play-state: running;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .player-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .player-artist {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.2);
            height: 4px;
            border-radius: 2px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .progress-bar {
            background: linear-gradient(90deg, #1db954, #1ed760);
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.1s;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .play-btn {
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
            background: rgba(29, 185, 84, 0.3);
            border: 2px solid #1db954;
        }

        .play-btn:hover {
            background: rgba(29, 185, 84, 0.5);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            /* FIX WARNING: Tambah 3 baris ini */
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #1db954;
            border-radius: 50%;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .spotify-player {
                margin: 15px;
                padding: 15px;
            }
        }

        /* LOADING ANIMATION */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

</head>

    <!-- JAVASCRIPT PLAYER -->
    <script>
        class SpotifyPlayer {
            constructor() {
                this.audio = new Audio();
                this.isPlaying = false;
                this.currentSong = 0;
                this.songs = [
                    { title: 'A Thousand Years', artist: 'James Arthur', src: 'playlist/a thousand years.mp4', cover: 'cover/james arthur.jpg' },
                    { title: 'Tak Kan Hilang', artist: 'Budi Doremi', src: 'playlist/takan hilang.mp4', cover: 'cover/budi doremi takan hilang.jpg' },
                    { title: 'Abadi', artist: 'Budi Doremi', src: 'playlist/abadi.m4a', cover: 'cover/bda.jpg' }
                ];

                this.init();
            }

            init() {
                this.loadSong();
                this.bindEvents();
                this.updateDisplay();
            }

            loadSong() {
                const song = this.songs[this.currentSong];
                this.audio.src = song.src;
                document.getElementById('playerTitle').textContent = song.title;
                document.getElementById('playerArtist').textContent = song.artist;
                document.getElementById('playerCover').src = song.cover;
            }

            bindEvents() {
                // Play/Pause
                document.getElementById('playBtn').addEventListener('click', () => this.togglePlay());

                // Next/Prev
                document.getElementById('nextBtn').addEventListener('click', () => this.nextSong());
                document.getElementById('prevBtn').addEventListener('click', () => this.prevSong());

                // Progress
                document.getElementById('progressContainer').addEventListener('click', (e) => this.setProgress(e));

                // Volume
                document.getElementById('volumeSlider').addEventListener('input', (e) => {
                    this.audio.volume = e.target.value / 100;
                });

                // Audio events
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
                this.audio.addEventListener('ended', () => this.nextSong());
                this.audio.addEventListener('play', () => this.onPlay());
                this.audio.addEventListener('pause', () => this.onPause());
            }

            togglePlay() {
                if (this.isPlaying) {
                    this.audio.pause();
                } else {
                    this.audio.play();
                }
            }

            nextSong() {
                this.currentSong = (this.currentSong + 1) % this.songs.length;
                this.loadSong();
                if (this.isPlaying) this.audio.play();
            }

            prevSong() {
                this.currentSong = (this.currentSong - 1 + this.songs.length) % this.songs.length;
                this.loadSong();
                if (this.isPlaying) this.audio.play();
            }

            updateProgress() {
                const progress = (this.audio.currentTime / this.audio.duration) * 100;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('currentTime').textContent = this.formatTime(this.audio.currentTime);
            }

            updateDuration() {
                document.getElementById('duration').textContent = this.formatTime(this.audio.duration);
            }

            setProgress(e) {
                const progress = document.getElementById('progressContainer');
                const clickX = e.offsetX;
                const duration = this.audio.duration;
                this.audio.currentTime = (clickX / progress.offsetWidth) * duration;
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            onPlay() {
                this.isPlaying = true;
                document.getElementById('playBtn').innerHTML = '⏸️';
                document.getElementById('playerCover').classList.add('playing');
            }

            onPause() {
                this.isPlaying = false;
                document.getElementById('playBtn').innerHTML = '▶️';
                document.getElementById('playerCover').classList.remove('playing');
            }

            updateDisplay() {
                // Auto update every second
                setInterval(() => {
                    if (!this.isPlaying) return;
                    this.updateProgress();
                }, 1000);
            }
        }

        // INIT PLAYER
        const player = new SpotifyPlayer();
    </script>
