<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:1.3rem;
font-weight:bold;
}

.menu{
display:flex;
gap:30px;
list-style:none;
margin:0;
padding:0;
}

.menu a{
text-decoration:none;
color:white;
font-size:0.95rem;
transition:0.3s;
}

.menu a:hover{
color:#7ec8ff;
}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
  background: linear-gradient(135deg,#0f2027,#2c5364,#1a1a2e);
  background-size:600% 600%;
  animation:gradientBG 20s ease infinite;
  color:white;
  text-align:center;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
margin-top:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* tombol */

.nav{
margin-bottom:40px;
}

button{
padding:12px 35px;
margin:10px;
border:none;
border-radius:30px;
background:rgba(255,255,255,0.3);
color:white;
cursor:pointer;
font-size:1rem;
backdrop-filter:blur(10px);
transition:0.3s;
}

button:hover{
background:rgba(255,255,255,0.6);
transform:scale(1.05);
}

a{
text-decoration:none;
}

@media (max-width:768px){

.menu{
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.navbar{
flex-direction:column;
gap:10px;
}

h1{
font-size:2.2rem;
}

}
.fade-in{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1.5s ease forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>
