<!DOCTYPE html>
<html>
<head>
<title>Galeri Kelas TKJ 1</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:1.3rem;
font-weight:bold;
}

.menu{
display:flex;
gap:30px;
list-style:none;
margin:0;
padding:0;
}

.menu a{
text-decoration:none;
color:white;
font-size:0.95rem;
transition:0.3s;
}

.menu a:hover{
color:#7ec8ff;
}

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
  background: linear-gradient(135deg,#0f2027,#2c5364,#1a1a2e);
  background-size:600% 600%;
  animation:gradientBG 20s ease infinite;
  color:white;
  text-align:center;
}

@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1{
  margin-top:40px;
  font-size:2.5rem;
}

/* container galeri */
.gallery{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* kartu foto */
.photo{
  position:relative;
  overflow:hidden;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* gambar */
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
}



/* efek zoom */
.photo:hover img{
  transform:scale(1.1);
}

/* caption */
.caption{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(5px);
  opacity:0;
  transition:0.3s;
}

.photo:hover .caption{
  opacity:1;
}

/* tombol navigasi */
.nav{
  display:flex;
  justify-content:center;
  gap: calc(30px);
  margin:50px 80px;
}

.btn{
  text-decoration:none;
  color:white;
  padding:12px 35px;
  border-radius:30px;
  background:rgba(255,255,255,0.2);
  transition:0.3s;
}

.btn:hover{
  background:rgba(255,255,255,0.5);
  transform:scale(1.08);
}

.nav-button{
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 40px 0;
}

.btn{
    text-decoration: none;
    padding: 12px 30px;
    background: #8fa3ad;
    color: white;
    border-radius: 25px;
    font-weight: 500;
}

.btn:hover{
    background: #6f8792;
}

@media (max-width:768px){

.menu{
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.navbar{
flex-direction:column;
gap:10px;
}

h1{
font-size:2.2rem;
}

}

.fade-in{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1.5s ease forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
