<!DOCTYPE html>
<html>
<head>
<title>Galeri Kelas TKJ 1</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  padding:0;
  background: linear-gradient(135deg,#0f2027,#2c5364,#1a1a2e);
  background-size:600% 600%;
  animation:gradientBG 20s ease infinite;
  color:white;
  text-align:center;
}

@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

h1{
  margin-top:40px;
  font-size:2.5rem;
}

/* container galeri */
.gallery{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* kartu foto */
.photo{
  position:relative;
  overflow:hidden;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* gambar */
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.5s;
}

/* efek zoom */
.photo:hover img{
  transform:scale(1.1);
}

/* caption */
.caption{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(5px);
  opacity:0;
  transition:0.3s;
}

.photo:hover .caption{
  opacity:1;
}

/* tombol navigasi */
.nav{
  display:flex;
  justify-content:space-between;
  margin:50px 80px;
}

.btn{
  text-decoration:none;
  color:white;
  padding:12px 35px;
  border-radius:30px;
  background:rgba(255,255,255,0.2);
  transition:0.3s;
}

.btn:hover{
  background:rgba(255,255,255,0.5);
  transform:scale(1.08);
}

</style>
</head>

<body>
